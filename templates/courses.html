{% extends 'base.html' %}

{% block title %}Courses - MyCourse{% endblock %}

{% block content %}
<div class="hero-dot-pattern"></div>


<div id="explore" class="section-block" style="margin-top: 2rem;">
    <h2 class="section-title">Explore courses</h2>
    <p class="section-desc">Master new skills with our expert-picked selections</p>
    <div class="grid" id="course-grid">
        <!-- Loaded via JS -->
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    function addToCart(id, title, price) {
        let cart = JSON.parse(localStorage.getItem('mycourse_cart') || '[]');
        if (cart.find(item => item.id === id)) {
            showToast('Item already in cart', 'info');
            return;
        }
        cart.push({ id, title, price });
        localStorage.setItem('mycourse_cart', JSON.stringify(cart));
        updateCartBadge();
        showToast('Successfully added to cart!', 'success');
    }

    document.addEventListener('DOMContentLoaded', async () => {
        const urlParams = new URLSearchParams(window.location.search);
        const cat = urlParams.get('category');
        const search = urlParams.get('search');

        let apiUrl = `${API_URL}/courses/`;
        let queryParams = [];
        if (cat) queryParams.push(`category=${encodeURIComponent(cat)}`);
        if (search) queryParams.push(`search=${encodeURIComponent(search)}`);
        if (queryParams.length > 0) apiUrl += `?${queryParams.join('&')}`;

        const res = await api.request(apiUrl);
        if (res.ok) {
            const courses = await res.json();
            const grid = document.getElementById('course-grid');
            if (courses.length === 0) {
                grid.innerHTML = '<p style="text-align: center; grid-column: 1/-1; color: var(--text-muted);">No courses found.</p>';
                return;
            }
            grid.innerHTML = courses.map(c => `
                <div class="card animate-fade" style="padding: 0; cursor: pointer; overflow: hidden;" onclick="window.location.href='/courses/${c.id}/'">
                    <div class="course-card-img-wrap">
                        <img src="${c.banner_image || 'https://images.unsplash.com/photo-1516321318423-f06f85e504b3?w=800&q=80'}" 
                             style="display: block; width: 100%; height: 100%; object-fit: cover;"
                             onerror="this.src='https://images.unsplash.com/photo-1501504905252-473c47e087f8?w=800&q=80'">
                    </div>
                    <div class="course-card-body">
                        <h3 class="course-card-title">${c.title}</h3>
                        <p class="course-card-meta">Expert Instructor</p>
                        <div class="course-card-rating">${c.average_rating || '4.5'} ${'★'.repeat(Math.round(c.average_rating || 4))}${'☆'.repeat(5 - Math.round(c.average_rating || 4))} <span>(${c.rating_count || '120'})</span></div>
                        <div class="course-card-price">₹${c.price}</div>
                        <span class="course-card-badge">Premium</span>
                    </div>
                </div>
            `).join('');
        }
    });
</script>
{% endblock %}
